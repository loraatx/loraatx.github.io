  <!-- Banner (hints / errors) -->
  <div id="tm-banner" class="tm-banner" hidden></div>

  <!-- Compass pill — top-center, points to nearest unvisited stop -->
  <button id="tm-compass" class="tm-compass" type="button" aria-label="Head to nearest unvisited stop" hidden>
    <span class="tm-compass-arrow" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3 l5 16 -5 -3 -5 3 z" fill="currentColor"/>
      </svg>
    </span>
    <span class="tm-compass-text">
      <span class="tm-compass-label">Next stop</span>
      <span class="tm-compass-dist">—</span>
    </span>
  </button>

  <!-- Progress chip — bottom-center (nav bar) -->
  <div id="tm-progress" class="tm-progress-chip" aria-live="polite">0 / 0</div>

  <!-- Stops panel toggle — bottom-left -->
  <button id="tm-stops-btn" class="tm-icon-btn" aria-label="Show stops list" title="Stops">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M3 6h18v2H3zM3 11h18v2H3zM3 16h18v2H3z"/>
    </svg>
  </button>

  <!-- Recenter button — bottom-left, above stops -->
  <button id="tm-recenter" class="tm-icon-btn" aria-label="Recenter map on my location" title="Recenter">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    </svg>
  </button>

  <!-- Stops side panel -->
  <aside id="tm-stops-panel" class="tm-stops-panel" aria-label="Tour stops">
    <div class="tm-stops-panel-header">
      <h2>Tour stops</h2>
      <button id="tm-stops-close" class="tm-stops-close" aria-label="Close stops list">×</button>
    </div>
    <ul id="tm-stops-list" class="tm-stops-list"></ul>
  </aside>

  <!-- Permission modal — first-paint overlay -->
  <div id="tm-permission" class="tm-permission-modal" role="dialog" aria-modal="true" aria-labelledby="tm-perm-title">
    <div class="tm-permission-card">
      <h2 id="tm-perm-title">Walking tour</h2>
      <p>This tour uses your location to trigger stops as you walk. Popups appear when you enter each point of interest. You can also preview the tour without sharing your location.</p>
      <div class="tm-actions">
        <button id="tm-preview"   class="tm-btn">Preview without GPS</button>
        <button id="tm-allow-gps" class="tm-btn is-primary">Allow location</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>
  <script src="storage.js"></script>
  <script src="engine.js"></script>
  <script src="ui.js"></script>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: [-97.7431, 30.2672],
      zoom: 14,
      pitch: 45,
      bearing: 0,
      antialias: true
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-left');

    const engine = new TourEngine(map);

    map.on('load', () => {
      initBasemapControls();

      const layers = map.getStyle().layers;
      let labelLayerId;
      for (const layer of layers) {
        if (layer.type === 'symbol' && layer.layout['text-field']) {
          labelLayerId = layer.id;
          break;
        }
      }
      map.addLayer({
        id: '3d-buildings',
        source: 'openmaptiles',
        'source-layer': 'building',
        filter: ['==', ['get', 'extrude'], 'true'],
        type: 'fill-extrusion',
        minzoom: 15,
        layout: { visibility: 'visible' },
        paint: {
          'fill-extrusion-color': '#aaa',
          'fill-extrusion-height': ['get', 'render_height'],
          'fill-extrusion-base': ['get', 'render_min_height'],
          'fill-extrusion-opacity': 0.55
        }
      }, labelLayerId);

      engine.start('tour.json').then(() => {
        initTourUI(engine);
      });
    });

    function initBasemapControls() {
      map.addSource('satellite', {
        type: 'raster',
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256,
        attribution: 'Tiles &copy; Esri'
      });

      map.addLayer({
        id: 'satellite-layer',
        type: 'raster',
        source: 'satellite',
        layout: { visibility: 'visible' }
      }, map.getStyle().layers[1].id);

      map.addControl({
        onAdd() {
          this._container = document.createElement('div');
          this._container.className = 'maplibregl-ctrl maplibregl-ctrl-group';

          this._satBtn = document.createElement('button');
          this._satBtn.className = 'satellite-btn active';
          this._satBtn.textContent = 'Satellite';
          this._satBtn.onclick = () => {
            const on = map.getLayoutProperty('satellite-layer', 'visibility') === 'visible';
            map.setLayoutProperty('satellite-layer', 'visibility', on ? 'none' : 'visible');
            this._satBtn.classList.toggle('active', !on);
          };
          this._container.appendChild(this._satBtn);

          this._viewBtn = document.createElement('button');
          this._viewBtn.className = 'view-toggle-btn active';
          this._viewBtn.textContent = '2D';
          this._viewBtn.onclick = () => {
            const tilted = map.getPitch() > 5;
            const nextPitch = tilted ? 0 : 45;
            map.easeTo({ pitch: nextPitch, duration: 600 });
            if (map.getLayer('3d-buildings')) {
              map.setLayoutProperty('3d-buildings', 'visibility', tilted ? 'none' : 'visible');
            }
            this._viewBtn.textContent = tilted ? '3D' : '2D';
            this._viewBtn.classList.toggle('active', !tilted);
          };
          this._container.appendChild(this._viewBtn);

          return this._container;
        },
        onRemove() { this._container.parentNode.removeChild(this._container); }
      }, 'top-left');
    }
  </script>
</body>
</html>
