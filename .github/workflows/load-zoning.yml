name: Load Zoning Polygons

# Pulls Austin's authoritative zoning polygon dataset from the City of Austin
# ArcGIS REST FeatureServer (PLANNINGCADASTRE_zoning_large_map_scale, owned by
# CTM.Publisher), loads it into Supabase Postgres + PostGIS, spatial-joins it
# onto parcels.zoning, and (re)installs the constraints RPC.
#
# Why ArcGIS, not Socrata: Austin's Socrata "Zoning Ordinance" view (q3y3-ungd)
# is a federated view with `internalToPublicFederatedView` flag and zero
# exposed columns — both the SODA /resource/ endpoint and the geospatial
# /api/geospatial/ export return empty/truncated bodies. The ArcGIS layer is
# the city's actively-maintained source (last MODIFIED_DATE ~3 days ago at
# time of writing) and has the schema we need: ZONING_ZTYPE (full code with
# overlays, e.g. "SF-3-NP") and ZONING_BASE (broad family, e.g. "SF").
#
# Required repo secrets (already configured for build-parcels-pmtiles.yml):
#   SUPABASE_DB_PASSWORD  raw database password
#
# Trigger from the GitHub UI (Actions tab -> "Load Zoning Polygons" -> Run
# workflow). Idempotent — safe to re-run on dataset refreshes.

on:
  workflow_dispatch:

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PGHOST:     aws-1-us-west-1.pooler.supabase.com
      PGPORT:     "5432"
      PGUSER:     postgres.tqnklodtiithbsxxyycp
      PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PGDATABASE: postgres
      LAYER_URL:  https://services.arcgis.com/0L95CJ0VTaxqcmED/arcgis/rest/services/PLANNINGCADASTRE_zoning_large_map_scale/FeatureServer/0
      PAGE_SIZE:  "2000"

    steps:
      - uses: actions/checkout@v4

      - name: Install GDAL + postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin postgresql-client jq
          ogr2ogr --version
          psql --version

      - name: Verify required secret is present
        run: |
          : "${PGPASSWORD:?SUPABASE_DB_PASSWORD secret missing}"

      - name: Test database connection
        run: psql -c 'select current_user, current_database(), now();'

      - name: Stop the dead SODA cron loader (if scheduled)
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          do $$
          begin
            if exists (select 1 from cron.job where jobname='zoning-load') then
              perform cron.unschedule('zoning-load');
              raise notice 'unscheduled zoning-load cron job';
            else
              raise notice 'no zoning-load cron job to unschedule';
            end if;
          end $$;
          SQL

      - name: Download zoning polygons from ArcGIS REST (paginated)
        run: |
          set -euo pipefail
          mkdir -p zoning_pages

          # Sanity: make sure the layer answers and report total count.
          TOTAL=$(curl -sSfL --retry 3 --max-time 60 \
            "${LAYER_URL}/query?where=1%3D1&returnCountOnly=true&f=pjson" \
            | jq '.count // 0')
          echo "Layer reports $TOTAL features"
          if [ "$TOTAL" -lt 1000 ]; then
            echo "Refusing to proceed: count=$TOTAL is implausibly low (expected ~22k)" >&2
            exit 1
          fi

          OFFSET=0
          PAGE=0
          while :; do
            URL="${LAYER_URL}/query?where=1%3D1&outFields=*&outSR=4326&f=geojson&resultOffset=${OFFSET}&resultRecordCount=${PAGE_SIZE}"
            curl -sSfL --retry 4 --retry-delay 5 --max-time 180 \
              -H "Accept: application/json" \
              "$URL" -o "zoning_pages/page_${PAGE}.geojson"
            COUNT=$(jq '.features | length' "zoning_pages/page_${PAGE}.geojson")
            echo "  page=$PAGE offset=$OFFSET features=$COUNT"
            if [ "$COUNT" -eq 0 ]; then
              rm "zoning_pages/page_${PAGE}.geojson"
              break
            fi
            OFFSET=$((OFFSET + COUNT))
            PAGE=$((PAGE + 1))
            # Defensive cap: 50 pages * 2000 = 100k features, well above the ~22k we expect.
            if [ "$PAGE" -ge 50 ]; then
              echo "Hit page cap of 50 — aborting" >&2
              exit 1
            fi
          done

          jq -s '{type: "FeatureCollection", features: (map(.features) | flatten)}' \
            zoning_pages/page_*.geojson > zoning.geojson
          rm -rf zoning_pages

          ls -lh zoning.geojson
          jq '{type: .type,
               features: (.features | length),
               first_props_keys: ((.features[0].properties // {}) | keys),
               first_geom_type:  (.features[0].geometry.type // null)}' zoning.geojson

      - name: Ensure rules table is installed
        run: psql -v ON_ERROR_STOP=1 -f scripts/sql/austin_zoning_rules.sql

      - name: Bulk-load GeoJSON into staging via ogr2ogr
        run: |
          set -euo pipefail
          # Use libpq env vars (ogr2ogr respects them) — avoids any URI-quoting trouble.
          ogr2ogr \
            -f PostgreSQL "PG:" \
            zoning.geojson \
            -nln public.zoning_polygons_stage \
            -overwrite \
            -lco GEOMETRY_NAME=geom \
            -lco LAUNDER=YES \
            -nlt PROMOTE_TO_MULTI \
            -t_srs EPSG:4326 \
            --config PG_USE_COPY YES \
            -progress
          psql -c "select count(*) as staged from public.zoning_polygons_stage;"
          psql -c "select column_name, data_type from information_schema.columns where table_schema='public' and table_name='zoning_polygons_stage' order by ordinal_position;"

      - name: Promote staging into zoning_polygons
        run: psql -v ON_ERROR_STOP=1 -f scripts/sql/zoning_stage_to_final.sql

      - name: Spatial-join into parcels.zoning
        run: psql -v ON_ERROR_STOP=1 -f scripts/sql/spatial_join_zoning.sql

      - name: Install/refresh get_parcel_constraints RPC
        run: psql -v ON_ERROR_STOP=1 -f scripts/sql/get_parcel_constraints.sql

      - name: Final stats
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          select count(*) as zoning_polygons from public.zoning_polygons;
          select count(*) filter (where zoning is not null) as parcels_with_zoning,
                 count(*)                                   as parcels_total,
                 round(100.0 * count(*) filter (where zoning is not null) / nullif(count(*),0), 1) as pct
            from public.parcels;
          select zoning, count(*) c
            from public.parcels
           where zoning is not null
           group by 1
           order by c desc
           limit 10;
          SQL
