name: Build Parcels PMTiles

# Generates the Austin parcels PMTiles archive from PostGIS and uploads it
# to Supabase Storage. Triggered manually from the Actions tab.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_DB_PASSWORD  raw database password (no URL encoding, no URI)
#   SUPABASE_URL          https://tqnklodtiithbsxxyycp.supabase.co
#   SUPABASE_SERVICE_KEY  service-role key (NOT the anon key)
#
# Connection details for the Session pooler are hardcoded below — only the
# password is a secret. This avoids any chance of URI-parsing trouble with
# Supabase's auto-generated passwords.

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/parcels_make_pmtiles.sh'
      - '.github/workflows/build-parcels-pmtiles.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # libpq picks these up automatically — ogr2ogr + psql both use libpq.
      PGHOST:               aws-1-us-west-1.pooler.supabase.com
      PGPORT:               "5432"
      PGUSER:               postgres.tqnklodtiithbsxxyycp
      PGPASSWORD:           ${{ secrets.SUPABASE_DB_PASSWORD }}
      PGDATABASE:           postgres
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      PMTILES_VERSION:      "1.22.2"

    steps:
      - uses: actions/checkout@v4

      - name: Install GDAL + postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin postgresql-client
          ogr2ogr --version
          psql --version

      - name: Verify required secrets are present
        run: |
          : "${PGPASSWORD:?SUPABASE_DB_PASSWORD secret missing}"
          : "${SUPABASE_URL:?SUPABASE_URL secret missing}"
          : "${SUPABASE_SERVICE_KEY:?SUPABASE_SERVICE_KEY secret missing}"
          echo "secrets present"

      - name: Test database connection
        run: |
          set -e
          echo "Testing connection: $PGUSER @ $PGHOST:$PGPORT / $PGDATABASE"
          psql -c 'select current_user, current_database(), now();'

      - name: Build tippecanoe (Felt fork)
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe
          make -j"$(nproc)"
          sudo make install
          tippecanoe --version

      - name: Install pmtiles CLI
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/protomaps/go-pmtiles/releases/download/v${PMTILES_VERSION}/go-pmtiles_${PMTILES_VERSION}_Linux_x86_64.tar.gz" \
            -o /tmp/pmtiles.tar.gz
          sudo tar -xzf /tmp/pmtiles.tar.gz -C /usr/local/bin pmtiles
          pmtiles version

      - name: Build & upload PMTiles
        run: bash scripts/parcels_make_pmtiles.sh
