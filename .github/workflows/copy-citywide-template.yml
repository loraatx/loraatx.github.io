name: Copy citywide template

on:
  workflow_dispatch:
    inputs:
      folder_name:
        description: "New folder name under apps/citywide/ (PascalCase, no spaces)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate folder name
        run: |
          name="${{ inputs.folder_name }}"
          if [[ ! "$name" =~ ^[A-Za-z][A-Za-z0-9_-]*$ ]]; then
            echo "Invalid folder name: '$name' (letters, digits, _, - only; must start with a letter)"
            exit 1
          fi
          if [ -e "apps/citywide/$name" ]; then
            echo "apps/citywide/$name already exists"
            exit 1
          fi

      - name: Copy template
        run: |
          mkdir -p apps/citywide
          cp -r apps/templates/citywide "apps/citywide/${{ inputs.folder_name }}"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "apps/citywide/${{ inputs.folder_name }}"
          git commit -m "Copy citywide template to ${{ inputs.folder_name }}"
          git push
