  <script>
    // ── Story map selector ─────────────────────────────────────────
    (function () {
      const frame = document.getElementById('storymap-frame');
      const nav   = document.getElementById('storymap-nav');

      fetch('/storymaps/index.json')
        .then(r => r.json())
        .then(maps => {
          if (!maps.length) return;

          // Load the first story map
          frame.src = '/storymaps/' + maps[0].id + '/';

          maps.forEach((map, i) => {
            const btn = document.createElement('button');
            btn.className = 'sm-nav-btn' + (i === 0 ? ' is-active' : '');
            btn.textContent = map.label;
            btn.addEventListener('click', () => {
              const target = '/storymaps/' + map.id + '/';
              if (frame.src.endsWith(target)) return;
              frame.src = target;
              nav.querySelectorAll('.sm-nav-btn').forEach(b => b.classList.remove('is-active'));
              btn.classList.add('is-active');
            });
            nav.appendChild(btn);
          });
        })
        .catch(() => {
          // If the config can't be fetched, hide the selector bar gracefully
          document.querySelector('.storymap-nav-bar')?.remove();
        });
    }());

    // ── Featured report cards ──────────────────────────────────────
    (function () {
      const cards = document.getElementById('report-cards');
      if (!cards) return;

      fetch('/storymaps/reports.json')
        .then(r => r.ok ? r.json() : [])
        .then(items => {
          if (!items || !items.length) {
            document.querySelector('.report-cards')?.remove();
            return;
          }
          items.forEach(item => {
            const card = document.createElement('a');
            card.className = 'report-card';
            card.href = item.href;
            if (item.accent) card.style.setProperty('--card-accent', item.accent);

            const eyebrow = document.createElement('span');
            eyebrow.className = 'report-card-eyebrow';
            eyebrow.textContent = item.eyebrow || 'Report';

            const title = document.createElement('h3');
            title.className = 'report-card-title';
            title.textContent = item.title || '';

            const blurb = document.createElement('p');
            blurb.className = 'report-card-blurb';
            blurb.textContent = item.blurb || '';

            card.appendChild(eyebrow);
            card.appendChild(title);
            card.appendChild(blurb);
            cards.appendChild(card);
          });
        })
        .catch(() => {
          document.querySelector('.report-cards')?.remove();
        });
    }());

    // ── Theme toggle ───────────────────────────────────────────────
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const storedTheme = localStorage.getItem('theme');
    const initialTheme = storedTheme || (prefersDark ? 'dark' : 'light');
    document.documentElement.dataset.theme = initialTheme;

    const themeToggle = document.querySelector('.theme-toggle');
    const toggleIcon  = themeToggle.querySelector('.toggle-icon');
    const toggleLabel = themeToggle.querySelector('.toggle-label');

    const updateToggleUI = (theme) => {
      toggleIcon.textContent  = theme === 'dark' ? '🌙' : '☀️';
      toggleLabel.textContent = theme === 'dark' ? 'Dark' : 'Light';
    };
    updateToggleUI(initialTheme);

    themeToggle.addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('theme', next);
      updateToggleUI(next);
    });

    // ── Mobile nav ─────────────────────────────────────────────────
    const primaryNav = document.querySelector('.primary-nav');
    const navToggle  = document.querySelector('.nav-toggle');

    navToggle?.addEventListener('click', () => {
      if (!primaryNav) return;
      const isOpen = primaryNav.classList.toggle('is-open');
      navToggle.setAttribute('aria-expanded', String(isOpen));
    });

    primaryNav?.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 900 && primaryNav.classList.contains('is-open')) {
          primaryNav.classList.remove('is-open');
          navToggle?.setAttribute('aria-expanded', 'false');
        }
      });
    });
  </script>
