  <script>
    // ── Category nav + report cards (drive the story map) ─────────
    (function () {
      const frame = document.getElementById('storymap-frame');
      const categoryNav = document.getElementById('category-nav');
      const cardsContainer = document.getElementById('report-cards');
      if (!frame || !categoryNav || !cardsContainer) return;

      const CATEGORY_ORDER = ['Shopping', 'Recreation', 'City Government', 'ChatMaps'];

      const CHATMAPS = [
        {
          id: 'pubchat',
          category: 'ChatMaps',
          title: 'Pubchat',
          eyebrow: 'Austin · Live chat',
          blurb: 'Walk into an Austin pub and drop into a public chat with whoever is there right now.',
          link: '/pubchat/',
          accent: '#e11d74'
        },
        {
          id: 'librarychat',
          category: 'ChatMaps',
          title: 'LibraryChat',
          eyebrow: 'Austin · Live chat',
          blurb: 'Every Austin Public Library branch is its own live reading-room chat.',
          link: '/librarychat/',
          accent: '#2d7a1a'
        },
        {
          id: 'homelesschat',
          category: 'ChatMaps',
          title: 'HomelessChat',
          eyebrow: 'Austin · Live chat',
          blurb: 'Angel House and Sunrise Navigation Center — walk in, connect, walk out.',
          link: '/homelesschat/',
          accent: '#2B6CB0'
        }
      ];

      fetch('/storymaps/reports.json')
        .then(r => r.ok ? r.json() : [])
        .then(items => {
          const all = [...(items || []), ...CHATMAPS];
          if (!all.length) {
            document.querySelector('.storymap-nav-bar')?.remove();
            document.querySelector('.report-cards')?.remove();
            return;
          }

          const byCategory = new Map();
          all.forEach(item => {
            const cat = item.category || 'Other';
            if (!byCategory.has(cat)) byCategory.set(cat, []);
            byCategory.get(cat).push(item);
          });

          const categories = [
            ...CATEGORY_ORDER.filter(c => byCategory.has(c)),
            ...Array.from(byCategory.keys()).filter(c => !CATEGORY_ORDER.includes(c)),
          ];

          if (!categories.length) {
            document.querySelector('.storymap-nav-bar')?.remove();
            document.querySelector('.report-cards')?.remove();
            return;
          }

          const categoryButtons = new Map();
          categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'sm-nav-btn';
            btn.textContent = cat;
            btn.addEventListener('click', () => selectCategory(cat));
            categoryNav.appendChild(btn);
            categoryButtons.set(cat, btn);
          });

          function loadStoryMap(id) {
            const target = '/storymaps/' + id + '/';
            if (!frame.src.endsWith(target)) {
              frame.src = target;
            }
          }

          function activateCard(card) {
            cardsContainer.querySelectorAll('.report-card').forEach(el => {
              el.classList.remove('is-active');
            });
            card.classList.add('is-active');
            loadStoryMap(card.dataset.storymap);
          }

          function renderCards(cat) {
            cardsContainer.innerHTML = '';
            const list = byCategory.get(cat) || [];
            list.forEach((item, index) => {
              const isLink = !!item.link;
              const card = document.createElement(isLink ? 'a' : 'button');
              if (isLink) {
                card.href = item.link;
                card.target = '_blank';
                card.rel = 'noopener noreferrer';
              } else {
                card.type = 'button';
              }
              card.className = 'report-card';
              card.dataset.storymap = item.id;
              if (item.accent) card.style.setProperty('--card-accent', item.accent);

              const eyebrow = document.createElement('span');
              eyebrow.className = 'report-card-eyebrow';
              eyebrow.textContent = item.eyebrow || 'Report';

              const title = document.createElement('h3');
              title.className = 'report-card-title';
              title.textContent = item.title || '';

              const blurb = document.createElement('p');
              blurb.className = 'report-card-blurb';
              blurb.textContent = item.blurb || '';

              card.appendChild(eyebrow);
              card.appendChild(title);
              card.appendChild(blurb);
              if (!isLink) {
                card.addEventListener('click', () => activateCard(card));
              }
              cardsContainer.appendChild(card);

              if (index === 0 && !isLink) activateCard(card);
            });
          }

          function selectCategory(cat) {
            categoryButtons.forEach((btn, key) => {
              btn.classList.toggle('is-active', key === cat);
            });
            renderCards(cat);
          }

          selectCategory(categories[0]);
        })
        .catch(() => {
          document.querySelector('.storymap-nav-bar')?.remove();
          document.querySelector('.report-cards')?.remove();
        });
    }());

    // ── Theme toggle ───────────────────────────────────────────────
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const storedTheme = localStorage.getItem('theme');
    const initialTheme = storedTheme || (prefersDark ? 'dark' : 'light');
    document.documentElement.dataset.theme = initialTheme;

    const themeToggle = document.querySelector('.theme-toggle');
    const toggleIcon  = themeToggle.querySelector('.toggle-icon');
    const toggleLabel = themeToggle.querySelector('.toggle-label');

    const updateToggleUI = (theme) => {
      toggleIcon.textContent  = theme === 'dark' ? '🌙' : '☀️';
      toggleLabel.textContent = theme === 'dark' ? 'Dark' : 'Light';
    };
    updateToggleUI(initialTheme);

    themeToggle.addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('theme', next);
      updateToggleUI(next);
    });

    // ── Mobile nav ─────────────────────────────────────────────────
    const primaryNav = document.querySelector('.primary-nav');
    const navToggle  = document.querySelector('.nav-toggle');

    navToggle?.addEventListener('click', () => {
      if (!primaryNav) return;
      const isOpen = primaryNav.classList.toggle('is-open');
      navToggle.setAttribute('aria-expanded', String(isOpen));
    });

    primaryNav?.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 900 && primaryNav.classList.contains('is-open')) {
          primaryNav.classList.remove('is-open');
          navToggle?.setAttribute('aria-expanded', 'false');
        }
      });
    });
  </script>
</body>
</html>
