<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact • City Anatomy</title>
  <link rel="canonical" href="https://anatomy.city/contact.html" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <link href="/style.css" rel="stylesheet" />
  <style>
    .contact-page {
      max-width: 780px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
    }

    .contact-kicker {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 0.5rem;
    }

    .contact-page h1 {
      font-family: 'Poppins', system-ui, sans-serif;
      font-size: clamp(1.9rem, 4vw, 2.6rem);
      font-weight: 700;
      margin: 0 0 2.5rem;
      color: var(--text);
      line-height: 1.15;
    }

    .contact-card {
      display: flex;
      gap: 3rem;
      align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px var(--shadow);
    }

    .contact-photo {
      flex-shrink: 0;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 4px solid var(--accent);
      box-shadow: 0 6px 20px var(--shadow);
    }

    .contact-details {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-top: 0.5rem;
    }

    .contact-name {
      font-family: 'Poppins', system-ui, sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--text);
      margin: 0;
      line-height: 1.2;
    }

    .contact-role {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0;
    }

    .contact-divider {
      width: 48px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.05rem;
      color: var(--text);
      text-decoration: none;
    }

    a.contact-item:hover {
      color: var(--accent);
    }

    .contact-item-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1rem;
    }

    @media (max-width: 600px) {
      .contact-card {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1.5rem;
        padding: 2rem 1.5rem;
      }
      .contact-divider { margin: 0 auto; }
      .contact-item { justify-content: center; }
    }
  </style>
</head>
<body>
  <header id="top" class="topbar">
    <div class="topbar-left">
      <a class="brand" href="/index.html">City Anatomy</a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-label="Toggle navigation">
        <span class="nav-toggle-bar"></span>
      </button>
      <nav class="primary-nav" aria-label="Main navigation">
        <a href="/apps/">Apps</a>
        <a href="/services/">Services</a>
        <a href="/content/">Content</a>
        <a href="/contact.html" class="is-active">Contact</a>
      </nav>
    </div>
    <div class="topbar-right">
      <button class="theme-toggle" type="button" aria-label="Toggle color scheme">
        <span class="toggle-icon">☀️</span>
        <span class="toggle-label">Light</span>
      </button>
    </div>
  </header>

  <main class="contact-page">
    <p class="contact-kicker">Get in touch</p>
    <h1>Contact</h1>

    <div class="contact-card">
      <img
        src="/images/charles-thomas.jpg"
        alt="Charles Thomas"
        class="contact-photo"
      />

      <div class="contact-details">
        <p class="contact-name">Charles Thomas</p>
        <p class="contact-role">Founder · City Anatomy</p>
        <div class="contact-divider"></div>

        <a href="tel:+15126459434" class="contact-item">
          <span class="contact-item-icon">📞</span>
          <span>512-645-9434</span>
        </a>
      </div>
    </div>
  </main>
