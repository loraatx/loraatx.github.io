<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Example Page 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page">

    <header class="page-header">
      <div>
        <div class="eyebrow">MAP APP</div>
        <h1>Example Page 1</h1>
        <p class="subtext">Simple demo layout for list-based map apps.</p>
      </div>

      <div class="filters">
        <div class="filter-group">
          <label for="filterType">Type</label>
          <select id="filterType">
            <option value="all">All</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filterOutdoor">Outdoor Seating</label>
          <select id="filterOutdoor">
            <option value="all">All</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filterWifi">Wi-Fi</label>
          <select id="filterWifi">
            <option value="all">All</option>
          </select>
        </div>
      </div>
    </header>

    <section class="map-card">
      <div id="map"></div>
    </section>

    <section class="table-section">
      <div class="table-header">
        <h2>Locations</h2>
        <div id="resultCount">0 results</div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Outdoor</th>
              <th>Wi-Fi</th>
              <th>Neighborhood</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

  </div>

  <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
  <script src="./app.js"></script>
</body>
</html>
