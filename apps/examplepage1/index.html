<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map App</title>

  <link href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page">

    <header class="page-header">
      <div class="header-text">
        <div class="eyebrow" id="pageEyebrow"></div>
        <h1 id="pageTitle"></h1>
        <p class="subtext" id="pageSubtitle"></p>
      </div>
      <div class="filters" id="filters"></div>
    </header>

    <section class="map-card">
      <div id="map"></div>
    </section>

    <section class="table-section">
      <div class="table-header">
        <h2>Locations</h2>
        <div class="table-header-right">
          <div id="resultCount">0 results</div>
          <div class="export-wrap">
            <button class="export-btn" id="exportBtn">Export</button>
            <div class="export-menu" id="exportMenu">
              <button onclick="exportPDF()">PDF (Map + Table)</button>
              <button onclick="exportCSV()">CSV (Table)</button>
            </div>
          </div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

  </div>

  <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
