<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatMaps Overview · City Anatomy</title>
  <link href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #0e1117; }
    #map { position: fixed; inset: 0; }

    .cm-legend {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 10px;
      padding: 10px 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
      font-size: 0.78rem;
      color: #1c1c28;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .cm-legend h2 {
      margin: 0 0 2px;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
      color: #5a6472;
    }
    .cm-legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cm-legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #1a202c;
      flex-shrink: 0;
    }
    .cm-legend-row a {
      color: inherit;
      text-decoration: none;
      font-weight: 600;
    }
    .cm-legend-row a:hover { text-decoration: underline; }

    @media (max-width: 500px) {
      .cm-legend { top: 10px; right: 10px; padding: 8px 10px; font-size: 0.72rem; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <aside class="cm-legend" aria-label="ChatMaps legend">
    <h2>ChatMaps · Austin</h2>
    <div class="cm-legend-row">
      <span class="cm-legend-dot" style="background: #e11d74"></span>
      <a href="/apps/chats/pubchat/" target="_top">Pubchat</a>
    </div>
    <div class="cm-legend-row">
      <span class="cm-legend-dot" style="background: #1a73ff"></span>
      <a href="/apps/chats/librarychat/" target="_top">LibraryChat</a>
    </div>
    <div class="cm-legend-row">
      <span class="cm-legend-dot" style="background: #f59e0b"></span>
      <a href="/apps/chats/homelesschat/" target="_top">Feedingschat</a>
    </div>
  </aside>

  <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>
  <script>
    const APPS = [
      { id: 'pubchat',       url: '/apps/chats/pubchat/hotspots.json',      color: '#e11d74' },
      { id: 'librarychat',   url: '/apps/chats/librarychat/hotspots.json',  color: '#1a73ff' },
      { id: 'feedingschat',  url: '/apps/chats/homelesschat/hotspots.json', color: '#f59e0b' },
    ];

    function circlePolygon([lng, lat], radiusMeters, points = 64) {
      const coords = [];
      const latRad = lat * Math.PI / 180;
      const mPerDegLat = 111320;
      const mPerDegLng = 111320 * Math.cos(latRad);
      for (let i = 0; i <= points; i++) {
        const a = (i / points) * 2 * Math.PI;
        const dLat = (radiusMeters * Math.cos(a)) / mPerDegLat;
        const dLng = (radiusMeters * Math.sin(a)) / mPerDegLng;
        coords.push([lng + dLng, lat + dLat]);
      }
      return { type: 'Polygon', coordinates: [coords] };
    }

    function toFeatures(hotspots, app) {
      return (hotspots || [])
        .filter(h => h.geofence?.center && h.geofence?.radiusMeters)
        .map(h => ({
          type: 'Feature',
          properties: {
            id: `${app.id}-${h.id}`,
            title: h.title,
            subtitle: h.subtitle || '',
            app: app.id,
            color: app.color,
          },
          geometry: circlePolygon(h.geofence.center, h.geofence.radiusMeters),
        }));
    }

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: [-97.7420, 30.2950],
      zoom: 10.5,
      antialias: true,
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-left');
    map.addControl(new maplibregl.NavigationControl({ showZoom: false }), 'top-right');

    map.on('load', async () => {
      const results = await Promise.all(
        APPS.map(app =>
          fetch(app.url)
            .then(r => r.ok ? r.json() : null)
            .then(json => ({ app, hotspots: json?.hotspots || [] }))
            .catch(() => ({ app, hotspots: [] }))
        )
      );

      const features = results.flatMap(({ app, hotspots }) => toFeatures(hotspots, app));

      map.addSource('chatmaps', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features },
      });

      map.addLayer({
        id: 'chatmaps-fill',
        type: 'fill',
        source: 'chatmaps',
        paint: {
          'fill-color': ['get', 'color'],
          'fill-opacity': 0.28,
        },
      });

      map.addLayer({
        id: 'chatmaps-outline',
        type: 'line',
        source: 'chatmaps',
        paint: {
          'line-color': '#1a202c',
          'line-width': 3,
          'line-opacity': 1,
        },
      });

      map.addLayer({
        id: 'chatmaps-label',
        type: 'symbol',
        source: 'chatmaps',
        layout: {
          'text-field': ['get', 'title'],
          'text-size': 11,
          'text-font': ['Noto Sans Regular'],
          'text-anchor': 'top',
          'text-offset': [0, 0.6],
          'text-allow-overlap': false,
        },
        paint: {
          'text-color': '#1c1c28',
          'text-halo-color': '#ffffff',
          'text-halo-width': 1.4,
        },
      });

      map.on('click', 'chatmaps-fill', (e) => {
        const f = e.features?.[0];
        if (!f) return;
        const linkMap = {
          pubchat: '/apps/chats/pubchat/',
          librarychat: '/apps/chats/librarychat/',
          feedingschat: '/apps/chats/homelesschat/',
        };
        const href = linkMap[f.properties.app];
        if (!href) return;
        const html = `
          <div style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; min-width: 180px;">
            <div style="font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: ${f.properties.color}; font-weight: 700;">${f.properties.app}</div>
            <div style="font-size: 0.95rem; font-weight: 700; margin-top: 2px;">${f.properties.title}</div>
            ${f.properties.subtitle ? `<div style="font-size: 0.78rem; color: #5a6472; margin-top: 2px;">${f.properties.subtitle}</div>` : ''}
            <a href="${href}" target="_top" style="display: inline-block; margin-top: 8px; font-size: 0.78rem; font-weight: 700; color: ${f.properties.color}; text-decoration: none;">Open ${f.properties.app} ↗</a>
          </div>
        `;
        new maplibregl.Popup({ offset: 4, closeButton: true })
          .setLngLat(e.lngLat)
          .setHTML(html)
          .addTo(map);
      });

      map.on('mouseenter', 'chatmaps-fill', () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', 'chatmaps-fill', () => { map.getCanvas().style.cursor = ''; });

      if (features.length) {
        const b = new maplibregl.LngLatBounds();
        features.forEach(f => {
          f.geometry.coordinates[0].forEach(c => b.extend(c));
        });
        map.fitBounds(b, { padding: 40, duration: 0, maxZoom: 12 });
      }
    });
  </script>
</body>
</html>
