<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map App</title>

  <link href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page">

    <header class="page-header">
      <div class="header-left">
        <div class="eyebrow" id="pageEyebrow"></div>
        <h1 id="pageTitle"></h1>
      </div>
      <div class="toolbar">
        <button class="toolbar-btn" id="viewToggle" aria-label="Toggle 2D/3D view">2D</button>
        <button class="toolbar-btn" id="themeToggle" aria-label="Toggle dark mode"></button>
      </div>
    </header>

    <section class="map-card">
      <div id="map"></div>
    </section>

    <section class="draw-bar">
      <button class="draw-tb-btn" data-draw-mode="linestring">Line</button>
      <button class="draw-tb-btn" data-draw-mode="rectangle">Square</button>
      <button class="draw-tb-btn" data-draw-mode="circle">Circle</button>
      <button class="draw-tb-btn" data-draw-mode="polygon">Poly</button>
      <button class="draw-tb-btn" id="clearDrawBtn">Clear</button>
    </section>

    <section class="sub-header">
      <p class="subtext" id="pageSubtitle"></p>
      <div class="filters" id="filters"></div>
    </section>

    <section class="table-section">
      <div class="table-header">
        <h2>Locations</h2>
        <div class="table-header-right">
          <div id="resultCount">0 results</div>
          <div class="export-wrap">
            <button class="export-btn" id="exportBtn">Export</button>
            <div class="export-menu" id="exportMenu">
              <button onclick="exportPDF()">PDF (Map + Table)</button>
              <button onclick="exportCSV()">CSV (Table)</button>
            </div>
          </div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

  <script src="https://unpkg.com/terra-draw/dist/terra-draw.umd.js"></script>
  <script src="https://unpkg.com/terra-draw-maplibre-gl-adapter/dist/terra-draw-maplibre-gl-adapter.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
